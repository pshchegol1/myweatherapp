<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/565394ae51.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./css/bootstrap.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <title>MyWeatherApp</title>
</head>
<body>

    <div class="animated-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <h1 class="brand">
                <i class="fa-solid fa-cloud-sun" aria-hidden="true"></i>
                <span>My<span class="brand-accent">Weather</span>App</span>
            </h1>
        </header>

        <div class="error alert" role="alert" aria-live="polite"></div>

        <form id="search-form" class="search-form" autocomplete="off">
            <div class="search-wrap">
                <i class="fa-solid fa-magnifying-glass search-icon" aria-hidden="true"></i>
                <input
                    type="text"
                    id="city"
                    class="search-input"
                    placeholder="Search a city…"
                    aria-label="Search city"
                    required>
                <button type="button" class="clear-btn" id="clear-btn" aria-label="Clear input" hidden>
                    <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                </button>
                <button type="submit" class="search-submit" aria-label="Search">
                    <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
                </button>
            </div>
        </form>

        <div class="weather-skeleton" id="skeleton" hidden>
            <div class="skel skel-hero"></div>
            <div class="skel-row">
                <div class="skel skel-tile"></div>
                <div class="skel skel-tile"></div>
                <div class="skel skel-tile"></div>
            </div>
            <div class="skel-row">
                <div class="skel skel-card"></div>
                <div class="skel skel-card"></div>
                <div class="skel skel-card"></div>
            </div>
        </div>

        <div class="display-data" aria-live="polite"></div>
    </div>

    <script src="./js/main.js"></script>
</body>
</html>
